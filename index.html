<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agente de APIs LG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
    header { background: #1a1d27; padding: 16px 24px; border-bottom: 1px solid #2a2d3a; }
    header h1 { font-size: 1.2rem; color: #fff; }
    header p { font-size: 0.8rem; color: #888; margin-top: 2px; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; white-space: pre-wrap; }
    .msg.user { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.bot { background: #1e2130; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2d3a; }
    .msg.loading { opacity: 0.6; font-style: italic; }
    footer { background: #1a1d27; padding: 16px 24px; border-top: 1px solid #2a2d3a; display: flex; gap: 12px; }
    #input { flex: 1; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 0.95rem; outline: none; resize: none; height: 48px; }
    #input:focus { border-color: #2563eb; }
    #btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 0 20px; cursor: pointer; font-size: 1.1rem; transition: background 0.2s; }
    #btn:hover { background: #1d4ed8; }
    #btn:disabled { background: #334155; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Agente de APIs - LG lugar de gente</h1>
    <p>Faça perguntas sobre as APIs SOAP disponíveis</p>
  </header>
  <div id="chat">
    <div class="msg bot">Olá! Sou o especialista em APIs da LG lugar de gente. Pergunte-me sobre operações disponíveis, parâmetros, tipos de dados e muito mais.</div>
  </div>
  <footer>
    <textarea id="input" onkeydown="handleKey(event)"></textarea>
    <button id="btn" onclick="send()">➤</button>
  </footer>

  <script>
    const WEBHOOK_URL = 'https://n8n-production-8b74b.up.railway.app/webhook/chat';
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');

    function addMsg(text, type) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    }

    async function send() {
      const question = input.value.trim();
      if (!question) return;
      input.value = '';
      btn.disabled = true;
      addMsg(question, 'user');
      const loading = addMsg('Consultando as APIs...', 'bot loading');
      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, session_id: 'session-' + Date.now() })
        });
        const data = await res.json();
        loading.remove();
        addMsg(data.response || 'Sem resposta.', 'bot');
      } catch (e) {
        loading.remove();
        addMsg('Erro ao conectar com o agente. Tente novamente.', 'bot');
      }
      btn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
